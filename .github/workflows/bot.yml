name: Daily Goal Tips Bot

on:
  schedule:
    - cron: '0 12 * * *'  # 09:00 Brasil (UTC-3)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⚙️ Criar arquivos de estado (se não existirem)
        run: |
          touch bet_history.json
          touch bankroll_state.json
          touch learning_insights.json
          touch line_movement_log.json

      - name: 🚀 Rodar BOT (FREE + VIP)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_FREE: ${{ secrets.TELEGRAM_CHAT_ID_FREE }}
          TELEGRAM_CHAT_ID_VIP: ${{ secrets.TELEGRAM_CHAT_ID_VIP }}
        run: |
          python bot.py
