name: Daily Goal Tips Bot

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-bots:
    runs-on: ubuntu-latest

    env:
      BZ_API_KEY: ${{ secrets.BZ_API_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      VIP_LINK: ${{ secrets.VIP_LINK }}

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⚙️ Garantir arquivos de estado
        run: |
          touch history.json
          touch bankroll_state.json
          touch learning_insights.json
          touch line_movement_log.json

      - name: 🟡 Rodar REPORT FREE
        env:
          TELEGRAM_CHAT_ID_FREE: ${{ secrets.TELEGRAM_CHAT_ID_FREE }}
        run: |
          echo "Iniciando REPORT FREE..."
          python report_bot.py

      - name: 🟢 Rodar BOT FREE
        env:
          TELEGRAM_CHAT_ID_FREE: ${{ secrets.TELEGRAM_CHAT_ID_FREE }}
        run: |
          echo "Iniciando BOT FREE..."
          python bot_free.py

      - name: 🔴 Rodar BOT VIP
        env:
          TELEGRAM_CHAT_ID_VIP: ${{ secrets.TELEGRAM_CHAT_ID_VIP }}
        run: |
          echo "Iniciando BOT VIP..."
          python vip_bot.py

      - name: ✅ Finalizado
        run: echo "Bots executados com sucesso!"
