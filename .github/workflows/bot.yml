name: Goal Bots

on:
  workflow_dispatch:  # execução manual
  schedule:
    - cron: '0 12 * * *'  # 09:00 São Paulo (UTC-3)

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Clona repositório
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔹 Configura Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔹 Instala dependências
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 🔹 Garante que existe histórico
      - name: Ensure history file
        run: |
          if [ ! -f bet_history.json ]; then
            echo "[]" > bet_history.json
          fi

      # 🔹 Executa bots (não quebra se der erro)
      - name: Run bots
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          BZ_API_KEY: ${{ secrets.BZ_API_KEY }}
        run: |
          python bot_free.py || true
          python vip_bot.py || true
          python report_bot.py || true

      # 🔹 Salva histórico no repositório
      - name: Commit history
        run: |
          git config --global user.name "goal-bot"
          git config --global user.email "bot@goalbot.com"
          git add bet_history.json
          git commit -m "🤖 update history" || echo "no changes"
          git push
